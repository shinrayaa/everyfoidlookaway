<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in Browser</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }

        /* The background of your actual site */
        #actual-site {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: filter 0.5s ease;
        }

        /* The "Locked" state */
        .is-blurred { filter: blur(15px) brightness(0.5); pointer-events: none; }

        /* The Overlay */
        #tiktok-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            color: white;
            text-align: center;
        }

        /* The Animated Arrow pointing to the top-right 3 dots */
        .arrow {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 80px;
            animation: bounce 1s infinite;
            color: #ff0050; /* TikTok Red */
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-15deg); }
            50% { transform: translateY(15px) rotate(-15deg); }
        }

        .instruction-box {
            margin-top: 150px;
            padding: 20px;
        }

        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #ccc; line-height: 1.4; }
        
        .dots-icon {
            display: inline-block;
            background: #333;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <!-- 1. YOUR ACTUAL CONTENT GOES HERE -->
    <div id="actual-site">
        <h1 style="color: white;">Welcome to my dope site!</h1>
        <!-- Put your real site HTML/IFRAME/CONTENT here -->
    </div>

    <!-- 2. THE TIKTOK ESCAPE OVERLAY -->
    <div id="tiktok-overlay">
        <div class="arrow">⤴</div>
        <div class="instruction-box">
            <h1>Link Locked 🔒</h1>
            <p>TikTok limits this page's features.</p>
            <p>Tap the <span class="dots-icon">...</span> above</p>
            <p>and select <span style="color:#ff0050; font-weight:bold;">"Open in Browser"</span></p>
        </div>
    </div>

    <script>
        function checkBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isTikTok = ua.indexOf("TikTok") > -1 || ua.indexOf("ByteLocale") > -1;
            const siteContent = document.getElementById('actual-site');
            const overlay = document.getElementById('tiktok-overlay');

            if (isTikTok) {
                // LOCK THE SITE
                siteContent.classList.add('is-blurred');
                overlay.style.display = 'block';
            } else {
                // UNLOCK (Already in Chrome/Safari)
                siteContent.classList.remove('is-blurred');
                overlay.style.display = 'none';
            }
        }

        // Run the check instantly
        checkBrowser();
        
        // Optional: Re-check on focus (in case they come back)
        window.addEventListener('focus', checkBrowser);
    </script>
</body>
</html>
