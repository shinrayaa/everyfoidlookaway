<script>
  // 1. Grab the user's device info
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  
  // 2. Check if they are trapped in TikTok's browser
  const isTikTok = ua.indexOf("TikTok") > -1 || ua.indexOf("ByteLocale") > -1;

  if (isTikTok) {
    // 3. The Android Escape Route
    if (/android/i.test(ua)) {
      window.location.href = "intent://YOUR_WEBSITE.com#Intent;scheme=https;package=com.android.chrome;end;";
    }
    // 4. The iPhone Escape Route
    else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
      // Tries to force Chrome on iOS. You can also experiment with x-safari-https://
      window.location.href = "googlechrome://navigate?url=YOUR_WEBSITE.com"; 
    }
  } else {
    // 5. If they are already in a normal browser, just send them to your site!
    window.location.href = "https://YOUR_WEBSITE.com";
  }
</script>
