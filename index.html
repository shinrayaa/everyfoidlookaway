<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* Modern Dark Mode UI - Hidden by default */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* The UI wrapper starts hidden */
        #fallback-ui {
            display: none; 
            background: #111111;
            padding: 40px 20px;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            max-width: 90%;
            width: 350px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #fff; }
        p { color: #aaaaaa; font-size: 0.95rem; line-height: 1.5; margin-bottom: 30px; }

        .escape-btn {
            background-color: #ff0050;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 80, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 80, 0); }
        }

        .manual-tip { margin-top: 25px; font-size: 0.85rem; color: #777; }
        .highlight { color: #ff0050; font-weight: bold; }
        
        /* Loading Spinner */
        #loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff0050;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- Shows while the exploits are firing -->
    <div id="loader"></div>

    <!-- Shows ONLY if the exploits fail -->
    <div id="fallback-ui">
        <h1>Action Required 🚨</h1>
        <p>TikTok is blocking this page. Tap below to force it open in your browser!</p>
        
        <button class="escape-btn" onclick="fireManualClick()">🚀 Open in Chrome</button>
        
        <div class="manual-tip">
            If nothing happens, tap the <span class="highlight">3 dots ↗️</span> in the top right corner and select <span class="highlight">"Open in Browser"</span>.
        </div>
    </div>

    <script>
        // 🛑 1. SET YOUR URLS HERE 🛑
        const TARGET_DOMAIN = "your-website-here.com"; 
        const FALLBACK_URL = "https%3A%2F%2Fyour-website-here.com"; 

        // 🧬 2. GENERATE THE INTENTS
        const intentChrome = `intent://${TARGET_DOMAIN}#Intent;scheme=https;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;package=com.android.chrome;S.browser_fallback_url=${FALLBACK_URL};end;`;
        const intentNaked = `intent://${TARGET_DOMAIN}#Intent;scheme=https;action=android.intent.action.VIEW;end;`;

        // 📱 3. DEVICE CHECK
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isTikTok = ua.indexOf("TikTok") > -1 || ua.indexOf("ByteLocale") > -1;
        const isAndroid = /android/i.test(ua);

        // 💥 4. THE EXECUTION
        if (isTikTok && isAndroid) {
            
            // Method 1: Naked Iframe Injection
            let iframe1 = document.createElement('iframe');
            iframe1.style.display = 'none';
            iframe1.src = intentNaked;
            document.body.appendChild(iframe1);

            // Method 2: Chrome Iframe Injection
            let iframe2 = document.createElement('iframe');
            iframe2.style.display = 'none';
            iframe2.src = intentChrome;
            document.body.appendChild(iframe2);

            // Method 3: Ghost Clicker (Simulate human tap)
            let ghostLink = document.createElement('a');
            ghostLink.href = intentChrome;
            ghostLink.style.display = 'none';
            document.body.appendChild(ghostLink);
            ghostLink.click();

            // Method 4: Delayed Direct Replace
            setTimeout(() => {
                window.location.replace(intentChrome);
            }, 500);

            // Method 5: The Failsafe UI Reveal
            // If the user is still here after 1.5 seconds, TikTok blocked everything. Show the UI.
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('fallback-ui').style.display = 'block';
            }, 1500);

        } else {
            // Not in TikTok Android? Just send them to the site normally.
            window.location.replace("https://" + TARGET_DOMAIN);
        }

        // 🕹️ 5. MANUAL BUTTON OVERRIDE (For Method 5)
        function fireManualClick() {
            window.location.href = intentChrome;
        }
    </script>
</body>
</html>
